name: Deploy to SSH

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # rsync without --delete never removes files that exist on the
      # remote but not locally, so nothing gets wiped before upload.
      # SSHPASS is read from the environment (sshpass -e) instead of
      # a -p command-line argument so the password never shows up in
      # the process list.
      #
      # REMOTE_PATH defaults to "html/" (ADM.Tools' web root for a
      # domain connected as the account's primary domain). If your
      # site's document root is different, add an SSH_REMOTE_PATH
      # repository secret to override it.
      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
        run: |
          rsync -avz --no-owner --no-group \
            -e "sshpass -e ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            out/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${REMOTE_PATH:-html/}"
